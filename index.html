<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Norfolk Insider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Bright, Cheery Palette */
      --bg: #f5f7f5;
      --surface: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #2c332d;
      --text-muted: #5e6b60;
      --text-dim: #8b9c8e;
      
      /* Sunny Amber */
      --amber: #e07a16;
      --amber-dim: #fff7ed;
      --amber-text: #964d05;
      
      /* Fresh Green */
      --green: #25995b;
      --green-dim: #ebf7f0;
      
      /* New: Soft Shadows for depth */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 8px 24px -6px rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { background: var(--bg); }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(env(safe-area-inset-bottom) + 1rem);
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      padding: 3rem 1.25rem 1.5rem;
      position: relative;
    }

    .header-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .header-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.6rem;
      font-weight: 900;
      line-height: 0.95;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-title em {
      font-style: italic;
      color: var(--amber);
    }

    .header-date {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* ── Weather Card ────────────────────────────────────────── */
    .weather-card {
      margin: 0 1.25rem 1rem;
      background: var(--amber-dim);
      border: 1px solid rgba(224, 122, 22, 0.15);
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.5s ease 0.1s forwards;
    }

    .weather-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .weather-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber);
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .weather-temp {
      font-family: 'Fraunces', serif;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      color: var(--amber);
    }

    .weather-temp sup {
      font-size: 1.2rem;
      vertical-align: super;
      font-weight: 400;
    }

    .weather-condition {
      font-size: 0.85rem;
      color: var(--amber-text);
      font-weight: 500;
      text-transform: capitalize;
      margin-top: 0.15rem;
    }

    .weather-stats {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .weather-stat {
      text-align: right;
    }

    .weather-stat-val {
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--amber);
      line-height: 1;
    }

    .weather-stat-lbl {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber-text);
      opacity: 0.7;
      margin-top: 0.1rem;
      font-weight: 600;
    }

    .weather-blurb {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--amber-text);
      font-weight: 400;
      font-style: italic;
      border-top: 1px solid rgba(224, 122, 22, 0.12);
      padding-top: 0.75rem;
    }

    /* ── Section ─────────────────────────────────────────────── */
    .section {
      margin: 0 1.25rem 1rem;
      opacity: 0;
      transform: translateY(16px);
    }

    .section:nth-child(3) { animation: rise 0.5s ease 0.2s forwards; }
    .section:nth-child(4) { animation: rise 0.5s ease 0.3s forwards; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }

    .section-count {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* ── News Cards ──────────────────────────────────────────── */
    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .news-card:active {
      transform: scale(0.98);
      box-shadow: none;
      border-color: rgba(0,0,0,0.15);
    }

    .news-card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .news-card-source {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .news-card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .news-card-summary {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-muted);
      font-weight: 400;
    }

    .news-card-arrow {
      display: inline-block;
      margin-top: 0.6rem;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: var(--green);
      font-weight: 600;
    }

    /* ── Event Cards ─────────────────────────────────────────── */
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      gap: 0.875rem;
      align-items: flex-start;
      box-shadow: var(--shadow-sm);
    }

    .event-date-pill {
      flex-shrink: 0;
      background: var(--green-dim);
      border: 1px solid rgba(37, 153, 91, 0.15);
      border-radius: 10px;
      padding: 0.5rem 0.6rem;
      text-align: center;
      min-width: 48px;
    }

    .event-date-day {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      font-weight: 900;
      line-height: 1;
      color: var(--green);
    }

    .event-date-mon {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.8;
      font-weight: 600;
      margin-top: 0.2rem;
    }

    .event-body {}

    .event-title {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .event-location {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .event-blurb {
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Empty State ─────────────────────────────────────────── */
    .empty {
      padding: 1.5rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-style: italic;
      background: var(--surface);
      border-radius: 12px;
      border: 1px dashed rgba(0,0,0,0.1);
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer {
      margin: 2rem 1.25rem 0;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-brand {
      font-family: 'Fraunces', serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-dim);
      font-style: italic;
    }

    .footer-meta {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-weight: 500;
      text-align: right;
    }

    /* ── Loading ─────────────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1rem;
      padding: 2rem;
    }

    .loading-title {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 700;
      font-style: italic;
      color: var(--text-muted);
    }

    .loading-dots {
      display: flex;
      gap: 0.4rem;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      animation: blink 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* ── Divider ─────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0.5rem 1.25rem 1.25rem;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="loading">
      <div class="loading-title">Good morning, Norfolk.</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <script>
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function parseDatePill(dateStr) {
      if (!dateStr) return { day: '—', mon: '—' };
      // Handle YYYY-MM-DD
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        return { day: parseInt(parts[2]), mon: MONTHS[parseInt(parts[1]) - 1] };
      }
      // Try parsing human-readable like "Friday, April 11"
      const match = dateStr.match(/(\w+)\s+(\d+)/);
      if (match) {
        const monIdx = MONTHS.findIndex(m => match[1].startsWith(m));
        return { day: match[2], mon: monIdx >= 0 ? MONTHS[monIdx] : match[1].substring(0,3) };
      }
      return { day: '—', mon: '—' };
    }

    function renderWeather(w) {
      return `
        <div class="weather-card">
          <div class="weather-top">
            <div>
              <div class="weather-label">Norfolk County Weather</div>
              <div class="weather-temp">${w.tempCurrent}<sup>°C</sup></div>
              <div class="weather-condition">${w.condition}</div>
            </div>
            <div class="weather-stats">
              <div class="weather-stat">
                <div class="weather-stat-val">${w.tempMax}°</div>
                <div class="weather-stat-lbl">High</div>
              </div>
              <div class="weather-stat">
                <div class="weather-stat-val">${w.tempMin}°</div>
                <div class="weather-stat-lbl">Low</div>
              </div>
              <div class="weather-stat">
                <div class="weather-stat-val">${w.rainChance}%</div>
                <div class="weather-stat-lbl">Rain</div>
              </div>
            </div>
          </div>
          ${w.blurb ? `<div class="weather-blurb">${w.blurb}</div>` : ''}
        </div>
      `;
    }

    function renderNews(news) {
      if (!news || news.length === 0) {
        return `<div class="empty">No news stories today. Check back tomorrow.</div>`;
      }
      return news.map(n => `
        <div class="news-card">
          <a href="${n.url}" target="_blank" rel="noopener">
            <div class="news-card-source">${n.source}</div>
            <div class="news-card-title">${n.title}</div>
            <div class="news-card-summary">${n.summary}</div>
            <span class="news-card-arrow">Read more →</span>
          </a>
        </div>
      `).join('');
    }

    function renderEvents(events) {
      if (!events || events.length === 0) {
        return `<div class="empty">No upcoming events. Submit one below.</div>`;
      }
      return events.map(ev => {
        const pill = parseDatePill(ev.date);
        return `
          <div class="event-card">
            <div class="event-date-pill">
              <div class="event-date-day">${pill.day}</div>
              <div class="event-date-mon">${pill.mon}</div>
            </div>
            <div class="event-body">
              <div class="event-title">${ev.title}</div>
              ${ev.location ? `<div class="event-location">${ev.location}</div>` : ''}
              ${ev.blurb ? `<div class="event-blurb">${ev.blurb}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function render(ed) {
      document.title = `The Norfolk Insider — ${ed.dateLabel || ed.date}`;

      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="header-eyebrow">Norfolk County · Daily Brief</div>
          <div class="header-title">The Norfolk <em>Insider</em></div>
          <div class="header-date">${ed.dateLabel || ed.date}</div>
        </div>

        ${renderWeather(ed.weather || {})}

        <div class="divider"></div>

        <div class="section">
          <div class="section-header">
            <div class="section-label">Local News</div>
            <div class="section-count">${(ed.news || []).length} stories</div>
          </div>
          ${renderNews(ed.news)}
        </div>

        <div class="section">
          <div class="section-header">
            <div class="section-label">Upcoming Events</div>
            <div class="section-count">${(ed.events || []).length} this week</div>
          </div>
          ${renderEvents(ed.events)}
        </div>

        <div class="footer">
          <div class="footer-brand">The Norfolk Insider</div>
          <div class="footer-meta">Updated daily · norfolkinsider.com</div>
        </div>
      `;
    }

    function renderError() {
      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="header-eyebrow">Norfolk County · Daily Brief</div>
          <div class="header-title">The Norfolk <em>Insider</em></div>
        </div>
        <div class="loading">
          <div class="loading-title">Today's edition isn't ready yet.</div>
          <p style="color:var(--text-dim);font-size:0.9rem;text-align:center;max-width:80%;">Check back after 8am, or ask Bradley what's going on.</p>
        </div>
      `;
    }

    async function load() {
      try {
        const res = await fetch('/api/edition');
        if (!res.ok) { renderError(); return; }
        render(await res.json());
      } catch {
        renderError();
      }
    }

    load();
  </script>
</body>
</html>
