<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Norfolk Insider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f7f5;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.06);
      --text: #2c332d;
      --text-muted: #5e6b60;
      --text-dim: #8b9c8e;
      --amber: #e07a16;
      --amber-dim: #fff7ed;
      --amber-text: #964d05;
      --green: #25995b;
      --green-dim: #ebf7f0;
      --purple: #6b5b95;
      --purple-dim: #f3f0f9;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 3rem;
    }

    /* Logo */
    .logo-wrap { padding: 2rem 1.25rem 0.5rem; text-align: center; }
    .logo { width: 160px; height: 160px; object-fit: contain; mix-blend-mode: multiply; }

    /* Header */
    .header { padding: 0.25rem 1.25rem 1.25rem; text-align: center; }
    .header-eyebrow { font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }
    .header-date { margin-top: 0.3rem; font-size: 0.75rem; color: var(--text-muted); }

    /* Weather */
    .weather-card {
      margin: 0 1.25rem 1rem;
      background: var(--amber-dim);
      border: 1px solid rgba(224,122,22,0.15);
      border-radius: 16px;
      padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow-sm);
      animation: rise 0.4s ease 0.1s both;
    }
    .weather-label { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); font-weight: 700; margin-bottom: 0.6rem; }
    .weather-main { display: flex; align-items: center; justify-content: space-between; }
    .weather-left { display: flex; align-items: baseline; gap: 0.6rem; }
    .weather-temp { font-family: 'Fraunces', serif; font-size: 2.8rem; font-weight: 700; line-height: 1; color: var(--amber); }
    .weather-temp sup { font-size: 1.1rem; font-weight: 400; vertical-align: super; }
    .weather-condition { font-size: 0.88rem; color: var(--amber-text); font-weight: 500; }
    .weather-stats { display: flex; gap: 1rem; }
    .weather-stat { text-align: right; }
    .weather-stat-val { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; color: var(--amber); line-height: 1; }
    .weather-stat-lbl { font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber-text); opacity: 0.7; font-weight: 600; margin-top: 0.1rem; }

    /* Quote */
    .quote-card {
      margin: 0 1.25rem 1rem;
      background: var(--purple-dim);
      border: 1px solid rgba(107,91,149,0.15);
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
      animation: rise 0.4s ease 0.15s both;
    }
    .quote-label { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--purple); font-weight: 700; margin-bottom: 0.75rem; }
    .quote-text { font-family: 'Fraunces', serif; font-size: 1.05rem; font-style: italic; line-height: 1.5; color: var(--text); margin-bottom: 0.6rem; }
    .quote-author { font-size: 0.75rem; color: var(--purple); font-weight: 600; letter-spacing: 0.05em; }

    /* Sections */
    .section { margin: 0 1.25rem 1.25rem; animation: rise 0.4s ease 0.2s both; }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .section-label { font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); font-weight: 700; }
    .section-count { font-size: 0.65rem; color: var(--text-dim); }
    .divider { height: 1px; background: var(--border); margin: 0.25rem 1.25rem 1.25rem; }

    /* Town groups */
    .town-group { margin-bottom: 1.25rem; }
    .town-label { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--green); font-weight: 700; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
    .town-label::after { content: ''; flex: 1; height: 1px; background: rgba(37,153,91,0.2); }

    /* Event cards */
    .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 0.9rem 1rem; margin-bottom: 0.6rem; display: flex; gap: 0.875rem; align-items: flex-start; box-shadow: var(--shadow-sm); }
    .event-date-pill { flex-shrink: 0; background: var(--green-dim); border: 1px solid rgba(37,153,91,0.15); border-radius: 10px; padding: 0.4rem 0.55rem; text-align: center; min-width: 46px; }
    .event-date-day { font-family: 'Fraunces', serif; font-size: 1.25rem; font-weight: 900; line-height: 1; color: var(--green); }
    .event-date-mon { font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); opacity: 0.75; font-weight: 600; margin-top: 0.15rem; }
    .event-body { flex: 1; min-width: 0; }
    .event-title { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 0.2rem; }
    .event-location { font-size: 0.65rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; margin-bottom: 0.25rem; }
    .event-blurb { font-size: 0.8rem; line-height: 1.55; color: var(--text-muted); }

    /* Empty */
    .empty { padding: 1.5rem; text-align: center; color: var(--text-dim); font-size: 0.85rem; font-style: italic; background: var(--surface); border-radius: 12px; border: 1px dashed rgba(0,0,0,0.08); }

    /* Footer */
    .footer { margin: 1.5rem 1.25rem 0; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-brand { font-family: 'Fraunces', serif; font-size: 0.85rem; font-weight: 700; font-style: italic; color: var(--text-dim); }
    .footer-meta { font-size: 0.62rem; color: var(--text-dim); text-align: right; line-height: 1.5; }

    /* Loading */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; padding: 2rem; }
    .loading-title { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 700; font-style: italic; color: var(--text-muted); }
    .loading-dots { display: flex; gap: 0.4rem; }
    .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); animation: blink 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="loading-title">Good morning, Norfolk.</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <script>
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var TOWNS = ['Port Dover','Port Rowan','Long Point','Simcoe','Delhi','Waterford','Tillsonburg','Vittoria','Teeterville','Langton','Norwich','Jarvis','Hagersville','Caledonia','Dunnville','Courtland','Windham','Scotland'];

    function extractTown(location) {
      if (!location) return 'Norfolk County';
      for (var i = 0; i < TOWNS.length; i++) {
        if (location.indexOf(TOWNS[i]) !== -1) return TOWNS[i];
      }
      var comma = location.lastIndexOf(',');
      if (comma > 0) return location.substring(comma + 1).trim();
      return 'Norfolk County';
    }

    function parseDatePill(dateStr) {
      if (!dateStr) return { day: '-', mon: '-' };
      var parts = dateStr.split('-');
      if (parts.length === 3) return { day: parseInt(parts[2]), mon: MONTHS[parseInt(parts[1]) - 1] };
      return { day: '-', mon: '-' };
    }

    function renderWeather(w) {
      if (!w || !w.condition) return '';
      return '<div class="weather-card">' +
        '<div class="weather-label">Norfolk County Weather</div>' +
        '<div class="weather-main">' +
          '<div class="weather-left">' +
            '<div class="weather-temp">' + w.tempCurrent + '<sup>C</sup></div>' +
            '<div class="weather-condition">' + w.condition + '</div>' +
          '</div>' +
          '<div class="weather-stats">' +
            '<div class="weather-stat"><div class="weather-stat-val">' + w.tempMax + '</div><div class="weather-stat-lbl">High</div></div>' +
            '<div class="weather-stat"><div class="weather-stat-val">' + w.tempMin + '</div><div class="weather-stat-lbl">Low</div></div>' +
            '<div class="weather-stat"><div class="weather-stat-val">' + w.rainChance + '%</div><div class="weather-stat-lbl">Rain</div></div>' +
            '<div class="weather-stat"><div class="weather-stat-val">' + w.windspeed + '</div><div class="weather-stat-lbl">km/h</div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function renderQuote(q) {
      if (!q || !q.quote) return '';
      return '<div class="quote-card">' +
        '<div class="quote-label">Today\'s Thought</div>' +
        '<div class="quote-text">\u201c' + q.quote + '\u201d</div>' +
        '<div class="quote-author">\u2014 ' + q.author + '</div>' +
      '</div>';
    }

    function renderEvents(events) {
      if (!events || events.length === 0) return '<div class="empty">No upcoming events in the next 30 days.</div>';
      var groups = {};
      events.forEach(function(ev) {
        var town = extractTown(ev.location);
        if (!groups[town]) groups[town] = [];
        groups[town].push(ev);
      });
      var sortedTowns = Object.keys(groups).sort(function(a, b) {
        if (a === 'Simcoe') return -1;
        if (b === 'Simcoe') return 1;
        return a.localeCompare(b);
      });
      return sortedTowns.map(function(town) {
        var cards = groups[town].map(function(ev) {
          var pill = parseDatePill(ev.date);
          return '<div class="event-card">' +
            '<div class="event-date-pill">' +
              '<div class="event-date-day">' + pill.day + '</div>' +
              '<div class="event-date-mon">' + pill.mon + '</div>' +
            '</div>' +
            '<div class="event-body">' +
              '<div class="event-title">' + ev.title + '</div>' +
              (ev.location ? '<div class="event-location">' + ev.location + '</div>' : '') +
              (ev.blurb ? '<div class="event-blurb">' + ev.blurb + '</div>' : '') +
            '</div>' +
          '</div>';
        }).join('');
        return '<div class="town-group"><div class="town-label">' + town + '</div>' + cards + '</div>';
      }).join('');
    }

    function render(ed) {
      document.title = 'The Norfolk Insider \u2014 ' + (ed.dateLabel || ed.date);
      document.getElementById('app').innerHTML =
        '<div class="logo-wrap"><img src="https://norfolkinsider.ca/wp-content/uploads/2026/04/Screenshot-2026-02-25-053350.png" alt="The Norfolk Insider" class="logo" /></div>' +
        '<div class="header"><div class="header-eyebrow">Norfolk County \u00b7 Daily Brief</div><div class="header-date">' + (ed.dateLabel || ed.date) + '</div></div>' +
        renderWeather(ed.weather) +
        renderQuote(ed.dailyQuote) +
        '<div class="divider"></div>' +
        '<div class="section">' +
          '<div class="section-header"><div class="section-label">Upcoming Events</div><div class="section-count">' + (ed.events || []).length + ' events</div></div>' +
          renderEvents(ed.events) +
        '</div>' +
        '<div class="footer"><div class="footer-brand">The Norfolk Insider</div><div class="footer-meta">Updated daily<br>norfolkinsider.com</div></div>';
    }

    function renderError() {
      document.getElementById('app').innerHTML =
        '<div class="logo-wrap"><img src="https://norfolkinsider.ca/wp-content/uploads/2026/04/Screenshot-2026-02-25-053350.png" alt="The Norfolk Insider" class="logo" /></div>' +
        '<div class="loading"><div class="loading-title">Check back after 8am.</div></div>';
    }

    fetch('/api/edition').then(function(res) {
      if (!res.ok) { renderError(); return; }
      res.json().then(render).catch(renderError);
    }).catch(renderError);
  </script>
</body>
</html>
